apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  # these labels are replica set labels
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
    # by using these lables replica set select the pod
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # this is pod , as we know pod is the subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  selector:
    # labels are the selectors
    project: roboshop
    tier: db
    component: redis
  ports:
  - protocol: TCP
    port: 6379 # service port
    targetPort: 6379 #container port
