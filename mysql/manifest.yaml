apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  # these labels are replica set labels
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  replicas: 1
  selector:
    # by using these lables replica set select the pod
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  # this is pod , as we know pod is the subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mysql
    spec:
      containers:
      - name: mysql
        image: esrasd/mysql:1.3.0
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  selector:
    # labels are the selectors
    project: roboshop
    tier: db
    component: mysql
  ports:
  - protocol: TCP
    port: 3306 # service port
    targetPort: 3306 #container port
